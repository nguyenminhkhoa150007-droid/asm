<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@eohjsc/era-widget@1.1.3/dist/index.min.js"></script>

<style>
body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#joy-zone {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: 3px solid cyan;
    position: relative;
}
#joy-puck {
    width: 90px;
    height: 90px;
    background: cyan;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div id="joy-zone">
    <div id="joy-puck"></div>
</div>

<script>
let eraWidget;
let control = null;

const era = new EraWidget();

era.init({
    onConfiguration: (config) => {
        console.log("CONFIG:", config);

        control = config.control_configs?.[0];

        if (!control) {
            console.error("❌ KHÔNG CÓ CONTROL (chưa tạo V0 đúng)");
        } else {
            console.log("✅ CONTROL OK");
        }
    }
});

// =====================
// GỬI DATA
// =====================
let lastSend = 0;

function sendXY(x, y) {
    if (!control) return;

    if (Date.now() - lastSend < 50) return;
    lastSend = Date.now();

    const data = `${x},${y}`;
    console.log("SEND:", data);

    era.write(control.id, data);
}

// =====================
// JOYSTICK
// =====================
const zone = document.getElementById('joy-zone');
const puck = document.getElementById('joy-puck');

let drag = false;
let cx=0, cy=0, maxR=0;

function move(e){
    const px = e.touches ? e.touches[0].clientX : e.clientX;
    const py = e.touches ? e.touches[0].clientY : e.clientY;

    let dx = px - cx;
    let dy = py - cy;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > maxR) {
        dx = dx/dist * maxR;
        dy = dy/dist * maxR;
    }

    puck.style.transform =
        `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

    let x = maxR ? Math.round(dx/maxR*100) : 0;
    let y = maxR ? Math.round(dy/maxR*100) : 0;

    sendXY(x, -y);
}

// mouse
zone.onmousedown = e=>{
    drag = true;

    let r = zone.getBoundingClientRect();
    cx = r.left + r.width/2;
    cy = r.top + r.height/2;

    maxR = zone.offsetWidth/2 - puck.offsetWidth/2;

    move(e);
};

document.onmousemove = e=>{
    if(drag) move(e);
};

document.onmouseup = ()=>{
    drag=false;
    puck.style.transform='translate(-50%,-50%)';
    sendXY(0,0);
};

// touch
zone.ontouchstart = e=>{
    drag = true;

    let r = zone.getBoundingClientRect();
    cx = r.left + r.width/2;
    cy = r.top + r.height/2;

    maxR = zone.offsetWidth/2 - puck.offsetWidth/2;

    move(e);
};

document.ontouchmove = e=>{
    if(drag){
        e.preventDefault();
        move(e);
    }
};

document.ontouchend = ()=>{
    drag=false;
    puck.style.transform='translate(-50%,-50%)';
    sendXY(0,0);
};
</script>

</body>
</html>
