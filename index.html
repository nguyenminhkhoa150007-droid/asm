<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joystick</title>

<style>
body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#joy-zone {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: 3px solid cyan;
    position: relative;
}
#joy-puck {
    width: 90px;
    height: 90px;
    background: cyan;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div id="joy-zone">
    <div id="joy-puck"></div>
</div>

<script src="https://eoh-jsc.github.io/era-widget/era_widget.js"></script>

<script>
let eraWidget = null;
let eraConfig = null;

function initEra() {
    if (typeof EraWidget === 'undefined') {
        setTimeout(initEra, 500);
        return;
    }

    eraWidget = new EraWidget();

    eraWidget.init({
        onConfiguration: (config) => {
            eraConfig = config;
            console.log("✅ CONFIG OK");
        }
    });
}
initEra();

const zone = document.getElementById('joy-zone');
const puck = document.getElementById('joy-puck');

let drag = false, cx=0, cy=0, maxR=0;

function sendXY(x,y){
    if (!eraWidget || !eraConfig) return;

    let control = eraConfig.control_configs?.[0];
    if (!control) return;

    let data = `${x},${y}`;
    console.log("SEND:", data);

    eraWidget.write(control.id, data);
}

function move(e){
    const px = e.touches ? e.touches[0].clientX : e.clientX;
    const py = e.touches ? e.touches[0].clientY : e.clientY;

    let dx = px - cx;
    let dy = py - cy;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > maxR) {
        dx = dx/dist * maxR;
        dy = dy/dist * maxR;
    }

    puck.style.transform =
        `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

    let x = Math.round(dx/maxR*100);
    let y = Math.round(dy/maxR*100);

    sendXY(x, -y);
}

/* mouse */
zone.onmousedown = e=>{
    drag = true;
    maxR = zone.offsetWidth/2 - puck.offsetWidth/2;
    let r = zone.getBoundingClientRect();
    cx = r.left + r.width/2;
    cy = r.top + r.height/2;
    move(e);
};

document.onmousemove = e=>{
    if(drag) move(e);
};

document.onmouseup = ()=>{
    drag=false;
    puck.style.transform='translate(-50%,-50%)';
    sendXY(0,0);
};

/* mobile */
zone.ontouchstart = e=>{
    drag = true;
    maxR = zone.offsetWidth/2 - puck.offsetWidth/2;
    let r = zone.getBoundingClientRect();
    cx = r.left + r.width/2;
    cy = r.top + r.height/2;
    move(e);
};

document.ontouchmove = e=>{
    if(drag){
        e.preventDefault();
        move(e);
    }
};

document.ontouchend = ()=>{
    drag=false;
    puck.style.transform='translate(-50%,-50%)';
    sendXY(0,0);
};
</script>

</body>
</html>
