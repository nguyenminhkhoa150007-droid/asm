<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>

<style>
body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* joystick */
#joy-zone {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: 3px solid cyan;
    position: relative;
}

#joy-puck {
    width: 90px;
    height: 90px;
    background: cyan;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div id="joy-zone">
    <div id="joy-puck"></div>
</div>

<script>
// =====================
// ERA INIT (chuẩn giống code bạn)
// =====================
let eraWidget = null;
let eraConfig = null;
let control = null;

function initEra() {
    if (typeof EraWidget === 'undefined') {
        setTimeout(initEra, 500);
        return;
    }

    eraWidget = new EraWidget();

    eraWidget.init({
        onConfiguration: (config) => {
            console.log("✅ CONFIG OK");

            eraConfig = config;
            control = config.control_configs?.[0]; // control gửi xuống ESP32
        }
    });
}
initEra();


// =====================
// JOYSTICK
// =====================
const zone = document.getElementById('joy-zone');
const puck = document.getElementById('joy-puck');

let drag = false, cx=0, cy=0, maxR=0;


// =====================
// GỬI DATA
// =====================
function sendXY(x,y){
    if (!eraWidget || !control) return;

    // tránh lỗi WS
    if (!eraWidget.socket || eraWidget.socket.readyState !== 1) return;

    let data = `${x},${y}`;
    console.log("📤 SEND:", data);

    eraWidget.write(control.id, data);
}


// =====================
// MOVE
// =====================
function move(e){
    const px = e.touches ? e.touches[0].clientX : e.clientX;
    const py = e.touches ? e.touches[0].clientY : e.clientY;

    let dx = px - cx;
    let dy = py - cy;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > maxR) {
        dx = dx/dist * maxR;
        dy = dy/dist * maxR;
    }

    puck.style.transform =
        `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

    // fix NaN
    let x = maxR ? Math.round(dx/maxR*100) : 0;
    let y = maxR ? Math.round(dy/maxR*100) : 0;

    sendXY(x, -y);
}


// =====================
// MOUSE
// =====================
zone.onmousedown = e=>{
    drag = true;
    maxR = zone.offsetWidth/2 - puck.offsetWidth/2;

    let r = zone.getBoundingClientRect();
    cx = r.left + r.width/2;
    cy = r.top + r.height/2;

    move(e);
};

document.onmousemove = e=>{
    if(drag) move(e);
};

document.onmouseup = ()=>{
    drag=false;
    puck.style.transform='translate(-50%,-50%)';
    sendXY(0,0);
};


// =====================
// MOBILE
// =====================
zone.ontouchstart = e=>{
    drag = true;
    maxR = zone.offsetWidth/2 - puck.offsetWidth/2;

    let r = zone.getBoundingClientRect();
    cx = r.left + r.width/2;
    cy = r.top + r.height/2;

    move(e);
};

document.ontouchmove = e=>{
    if(drag){
        e.preventDefault();
        move(e);
    }
};

document.ontouchend = ()=>{
    drag=false;
    puck.style.transform='translate(-50%,-50%)';
    sendXY(0,0);
};
</script>

</body>
</html>
